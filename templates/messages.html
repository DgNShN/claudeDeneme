<!DOCTYPE html>
<html>
<head><title>Mesajlar</title></head>
<body>
  <h1>Gelen Mesajlar</h1>
  {% if messages %}
    <table border="1" cellpadding="8">
      <tr><th>ID</th><th>İsim</th><th>Email</th><th>Mesaj</th><th>Tarih</th></tr>
      {% for msg in messages %}
      <tr>
        <td>{{ msg.id }}</td>
        <td>{{ msg.name }}</td>
        <td>{{ msg.email }}</td>
        <td>{{ msg.message }}</td>
        <td>{{ msg.created_at }}</td>
      </tr>
      {% endfor %}
    </table>
  {% else %}
    <p>Henüz mesaj yok.</p>
  {% endif %}
  <a href="/">Ana Sayfa</a>
</body>
</html>
