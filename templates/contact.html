<!DOCTYPE html>
<html>
<head><title>İletişim</title></head>
<body>
  <h1>İletişim</h1>
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  {% if success %}<p style="color:green">{{ success }}</p>{% endif %}
  <form method="POST">
    <input type="text" name="name" placeholder="İsim" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>
    <textarea name="message" placeholder="Mesaj" required></textarea><br><br>
    <button type="submit">Gönder</button>
  </form>
  <a href="/">Ana Sayfa</a>
</body>
</html>
